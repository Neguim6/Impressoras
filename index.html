<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Impressoras">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Impressoras HGP</title>
    <style>
        :root {
            --bg-dark: #020617;
            --bg-panel: #0f172a;
            --bg-card: #1a2540;
            --accent: #38bdf8;
            --accent-dim: rgba(56, 189, 248, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #1e293b;
            --border-light: #263350;
            --row-hover: rgba(56, 189, 248, 0.07);
            --header-h: 70px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            padding-top: var(--header-h);
            min-height: 100vh;
        }

        /* ── INSTALL BANNER ── */
        #installBanner {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a5f;
            border: 1px solid rgba(56,189,248,0.35);
            border-radius: 14px;
            padding: 14px 18px;
            z-index: 2000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            align-items: center;
            gap: 14px;
            max-width: calc(100vw - 32px);
            width: 360px;
        }

        #installBanner svg { flex-shrink: 0; color: var(--accent); width:28px; height:28px; }
        .install-text { flex: 1; }
        .install-text strong { display: block; font-size: 0.9rem; color: var(--text-primary); margin-bottom: 2px; }
        .install-text span { font-size: 0.78rem; color: var(--text-secondary); }
        .install-actions { display: flex; gap: 8px; flex-shrink: 0; }

        .btn-install {
            background: var(--accent);
            color: #020617;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-dismiss {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 0.82rem;
            cursor: pointer;
        }

        /* iOS install tip */
        #iosTip {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a5f;
            border: 1px solid rgba(56,189,248,0.35);
            border-radius: 14px;
            padding: 16px 18px;
            z-index: 2000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: calc(100vw - 32px);
            width: 340px;
            text-align: center;
        }

        #iosTip p { margin: 0 0 6px; font-size: 0.85rem; color: var(--text-primary); }
        #iosTip small { color: var(--text-secondary); font-size: 0.78rem; line-height: 1.5; }
        #iosTip button { margin-top:12px; background:transparent; border:none; color:var(--accent); cursor:pointer; font-size:0.82rem; }

        /* ── HEADER ── */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-h);
            background: rgba(10, 18, 38, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 20px;
            z-index: 1000;
        }

        .header-logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .header-logo svg { width:26px; height:26px; color:var(--accent); }
        .header-title { font-size:0.9rem; font-weight:600; color:var(--text-primary); white-space:nowrap; }
        .header-title span { color:var(--accent); }

        .search-wrap { flex:1; max-width:600px; margin:0 auto; position:relative; }
        .search-wrap svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--text-secondary); pointer-events:none; }

        #searchInput {
            width:100%; padding:11px 16px 11px 40px;
            background:#1e293b; border:1px solid var(--border-light);
            border-radius:50px; color:#fff; font-size:0.9rem; outline:none;
            transition:all .25s;
        }
        #searchInput:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(56,189,248,.12); }

        .container { max-width:1400px; margin:0 auto; padding:20px 16px 80px; }
        .info-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; padding:0 4px; }
        .result-count { font-size:0.8rem; color:var(--text-secondary); }
        .result-count strong { color:var(--accent); }

        .table-card { background:var(--bg-panel); border-radius:14px; border:1px solid var(--border-light); overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,.4); }
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; text-align:left; }
        th { background:rgba(255,255,255,.03); padding:14px 18px; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--accent); border-bottom:1px solid var(--border-light); white-space:nowrap; }
        td { padding:13px 18px; border-bottom:1px solid var(--border); font-size:.875rem; color:var(--text-secondary); }
        tbody tr:hover { background:var(--row-hover); }

        .ip-badge { font-family:'Courier New',monospace; font-size:.8rem; background:var(--accent-dim); color:var(--accent); padding:3px 9px; border-radius:5px; border:1px solid rgba(56,189,248,.25); }
        .name-badge { font-weight:600; color:var(--text-primary); font-size:.85rem; }

        .card-list { display:none; flex-direction:column; gap:10px; }
        .printer-card { background:var(--bg-card); border:1px solid var(--border-light); border-radius:12px; padding:16px; }
        .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
        .card-name { font-weight:700; font-size:1rem; color:var(--text-primary); }
        .card-row { display:flex; align-items:baseline; gap:8px; margin-bottom:7px; }
        .card-label { font-size:.68rem; font-weight:700; text-transform:uppercase; color:var(--text-secondary); width:52px; }
        .card-value { font-size:.85rem; color:var(--text-secondary); flex:1; }

        @media (max-width: 768px) {
            :root { --header-h: 116px; }
            .header { flex-wrap:wrap; padding:10px 16px; gap:10px; }
            .table-card .table-wrap { display:none; }
            .card-list { display:flex; }
        }
    </style>
</head>

            <path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/>

        </div>
        <div class="install-actions">

                <path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/><circle cx="18" cy="11.5" r="0.5" fill="currentColor"/>

            <span class="header-title">SGP · <span>Impressoras HGP</span></span>
        </div>
        <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Pesquisar por nome, IP, local ou driver…" autocomplete="off">
        </div>
    </header>

    <main class="container">
        <div class="info-bar">
            <span class="result-count" id="resultCount"></span>
        </div>
        <div id="tableContent" class="table-card">
            <div class="table-wrap" id="tableWrap"></div>
        </div>
        <div id="cardList" class="card-list"></div>
    </main>

    <script>
        // ── SERVICE WORKER COM AUTO-REFRESH ──
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // Nova versão detectada, recarrega para aplicar
                            window.location.reload();
                        }
                    };
                };
            });
        }

        let deferredPrompt;
        const banner = document.getElementById('installBanner');
        const btnInstall = document.getElementById('btnInstall');

        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            banner.style.display = 'flex';
        });

        btnInstall.addEventListener('click', async () => {
            banner.style.display = 'none';
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
            }
        });

            banner.style.display = 'none';

        // ── LÓGICA DE RENDERIZAÇÃO ──
        const searchInput = document.getElementById('searchInput');
        const tableWrap = document.getElementById('tableWrap');
        const cardList = document.getElementById('cardList');
        const resultCount = document.getElementById('resultCount');

        function render(filter = '') {
            const term = filter.toLowerCase();
            const filtered = printerData.filter(p => 
                p["Nome da Impressora"].toLowerCase().includes(term) ||
                p["Comentários"].toLowerCase().includes(term) ||
                p["Local"].toLowerCase().includes(term) ||
                p["Nome do Driver"].toLowerCase().includes(term)
            );

            resultCount.innerHTML = `Exibindo <strong>${filtered.length}</strong> impressoras`;

            // Desktop Table
            let tableHtml = `<table><thead><tr>
                <th>Nome</th><th>Endereço IP</th><th>Localização</th><th>Driver</th>
            </tr></thead><tbody>`;
            
            // Mobile Cards
            let cardsHtml = '';

            filtered.forEach(p => {
                tableHtml += `<tr>
                    <td><span class="name-badge">${p["Nome da Impressora"]}</span></td>
                    <td><span class="ip-badge">${p["Comentários"]}</span></td>
                    <td>${p["Local"]}</td>
                    <td style="font-size:0.75rem; opacity:0.8">${p["Nome do Driver"]}</td>
                </tr>`;

                cardsHtml += `
                <div class="printer-card">
                    <div class="card-header">
                        <span class="card-name">${p["Nome da Impressora"]}</span>
                        <span class="ip-badge">${p["Comentários"]}</span>
                    </div>
                    <div class="card-row">
                        <span class="card-label">Local</span>
                        <span class="card-value">${p["Local"]}</span>
                    </div>
                    <div class="card-row">
                        <span class="card-label">Driver</span>
                        <span class="card-value" style="font-size:0.75rem">${p["Nome do Driver"]}</span>
                    </div>
                </div>`;
            });

            tableHtml += '</tbody></table>';
            tableWrap.innerHTML = filtered.length ? tableHtml : '<div class="empty-state"><p>Nenhuma impressora encontrada.</p></div>';
            cardList.innerHTML = filtered.length ? cardsHtml : '<div class="empty-state"><p>Nenhuma impressora encontrada.</p></div>';
        }

        searchInput.addEventListener('input', e => render(e.target.value));
        render(); // Initial load
    </script>
