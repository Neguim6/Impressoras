<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Impressoras">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Impressoras HGP</title>
    <style>
        :root {
            --bg-dark: #020617;
            --bg-panel: #0f172a;
            --bg-card: #1a2540;
            --accent: #38bdf8;
            --accent-dim: rgba(56, 189, 248, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #1e293b;
            --border-light: #263350;
            --row-hover: rgba(56, 189, 248, 0.07);
            --header-h: 70px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            padding-top: var(--header-h);
            min-height: 100vh;
        }

        /* ── INSTALL BANNER ── */
        #installBanner {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a5f;
            border: 1px solid rgba(56,189,248,0.35);
            border-radius: 14px;
            padding: 14px 18px;
            z-index: 2000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            gap: 14px;
            max-width: calc(100vw - 32px);
            width: 360px;
        }

        #installBanner svg { flex-shrink: 0; color: var(--accent); width:28px; height:28px; }

        .install-text { flex: 1; }
        .install-text strong { display: block; font-size: 0.9rem; color: var(--text-primary); margin-bottom: 2px; }
        .install-text span { font-size: 0.78rem; color: var(--text-secondary); }

        .install-actions { display: flex; gap: 8px; flex-shrink: 0; }

        .btn-install {
            background: var(--accent);
            color: #020617;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-dismiss {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 0.82rem;
            cursor: pointer;
        }

        /* iOS install tip */
        #iosTip {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a5f;
            border: 1px solid rgba(56,189,248,0.35);
            border-radius: 14px;
            padding: 16px 18px;
            z-index: 2000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: calc(100vw - 32px);
            width: 340px;
            text-align: center;
        }

        #iosTip p { margin: 0 0 6px; font-size: 0.85rem; color: var(--text-primary); }
        #iosTip small { color: var(--text-secondary); font-size: 0.78rem; line-height: 1.5; }
        #iosTip .arrow { position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); width:0; height:0;
            border-left:10px solid transparent; border-right:10px solid transparent;
            border-top:10px solid rgba(56,189,248,0.35); }
        #iosTip button { margin-top:12px; background:transparent; border:none; color:var(--accent); cursor:pointer; font-size:0.82rem; }

        /* ── HEADER ── */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-h);
            background: rgba(10, 18, 38, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 20px;
            z-index: 1000;
        }

        .header-logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .header-logo svg { width:26px; height:26px; color:var(--accent); }
        .header-title { font-size:0.9rem; font-weight:600; color:var(--text-primary); white-space:nowrap; }
        .header-title span { color:var(--accent); }

        .search-wrap { flex:1; max-width:600px; margin:0 auto; position:relative; }
        .search-wrap svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); width:15px; height:15px; color:var(--text-secondary); pointer-events:none; }

        #searchInput {
            width:100%; padding:11px 16px 11px 40px;
            background:#1e293b; border:1px solid var(--border-light);
            border-radius:50px; color:#fff; font-size:0.9rem; outline:none;
            transition:all .25s;
        }
        #searchInput::placeholder { color:var(--text-secondary); }
        #searchInput:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(56,189,248,.12); }

        /* ── CONTAINER ── */
        .container { max-width:1400px; margin:0 auto; padding:20px 16px 80px; }

        .info-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; padding:0 4px; }
        .result-count { font-size:0.8rem; color:var(--text-secondary); }
        .result-count strong { color:var(--accent); }

        /* ── TABLE ── */
        .table-card { background:var(--bg-panel); border-radius:14px; border:1px solid var(--border-light); overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,.4); }
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; text-align:left; }
        th { background:rgba(255,255,255,.03); padding:14px 18px; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--accent); border-bottom:1px solid var(--border-light); white-space:nowrap; }
        td { padding:13px 18px; border-bottom:1px solid var(--border); font-size:.875rem; color:var(--text-secondary); transition:color .15s; }
        tr:last-child td { border-bottom:none; }
        tbody tr:hover { background:var(--row-hover); }
        tbody tr:hover td { color:var(--text-primary); }

        /* ── BADGES ── */
        .ip-badge { font-family:'Courier New',monospace; font-size:.8rem; background:var(--accent-dim); color:var(--accent); padding:3px 9px; border-radius:5px; border:1px solid rgba(56,189,248,.25); white-space:nowrap; display:inline-block; }
        .name-badge { font-weight:600; color:var(--text-primary); font-size:.85rem; }

        /* ── CARDS (mobile) ── */
        .card-list { display:none; flex-direction:column; gap:10px; }
        .printer-card { background:var(--bg-card); border:1px solid var(--border-light); border-radius:12px; padding:16px; transition:border-color .2s,box-shadow .2s; }
        .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; gap:10px; }
        .card-name { font-weight:700; font-size:1rem; color:var(--text-primary); }
        .card-row { display:flex; align-items:baseline; gap:8px; margin-bottom:7px; }
        .card-row:last-child { margin-bottom:0; }
        .card-label { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-secondary); flex-shrink:0; width:52px; }
        .card-value { font-size:.85rem; color:var(--text-secondary); flex:1; line-height:1.4; }

        /* ── EMPTY ── */
        .empty-state { padding:60px 20px; text-align:center; color:var(--text-secondary); }
        .empty-state svg { width:48px; height:48px; opacity:.3; margin-bottom:14px; }
        .empty-state p { margin:0; font-size:.95rem; }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background:var(--border-light); border-radius:10px; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            :root { --header-h: 116px; }
            .header { flex-wrap:wrap; padding:10px 16px; gap:10px; height:auto; min-height:var(--header-h); }
            .header-logo { order:1; }
            .search-wrap { order:3; max-width:100%; width:100%; margin:0; }
            .table-card .table-wrap { display:none; }
            .card-list { display:flex; }
            .container { padding:14px 12px 80px; }
        }

        @media (max-width: 480px) {
            .header-title { display:none; }
            :root { --header-h: 88px; }
        }
    </style>
</head>

            e.preventDefault();

            banner.style.display = 'none';
            deferredPrompt.prompt();

        const searchInput = document.getElementById('searchInput');

        function stripPrefix(local) {
            return local.replace(/^SES - HGP - /i, '');
        }

        function renderTable(data) {
            countEl.innerHTML = `<strong>${data.length}</strong> de ${printerData.length} impressoras`;

            const empty = `<div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <p>Nenhum resultado encontrado.</p>
            </div>`;

            if (data.length === 0) {
                tableWrap.innerHTML = empty;
                cardList.innerHTML = empty;
                return;
            }

            let tbl = `<table><thead><tr>
                <th>Nome</th><th>IP</th><th>Local</th><th>Driver</th>
            </tr></thead><tbody>`;
            data.forEach(item => {
                tbl += `<tr>
                    <td><span class="name-badge">${item["Nome da Impressora"]}</span></td>
                    <td><span class="ip-badge">${item["Comentários"]}</span></td>
                    <td>${item["Local"]}</td>
                    <td>${item["Nome do Driver"]}</td>
                </tr>`;
            });
            tbl += `</tbody></table>`;
            tableWrap.innerHTML = tbl;

            let cards = '';
            data.forEach(item => {
                cards += `<div class="printer-card">
                    <div class="card-header">
                        <span class="card-name">${item["Nome da Impressora"]}</span>
                        <span class="ip-badge">${item["Comentários"]}</span>
                    </div>
                    <div class="card-row">
                        <span class="card-label">Local</span>
                        <span class="card-value">${stripPrefix(item["Local"])}</span>
                    </div>
                    <div class="card-row">
                        <span class="card-label">Driver</span>
                        <span class="card-value">${item["Nome do Driver"]}</span>
                    </div>
                </div>`;
            });
            cardList.innerHTML = cards;
        }

        searchInput.addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            const filtered = printerData.filter(item =>
                Object.values(item).some(v => String(v).toLowerCase().includes(term))
            );
            renderTable(filtered);
        });

        renderTable(printerData);
