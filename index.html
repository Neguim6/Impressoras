    <style>
        /* Estilos Gerais - Modo Escuro */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #121212; /* Fundo escuro */
            color: #e0e0e0; /* Texto claro */
        }

        h2 {
            text-align: center;
            color: #bb86fc; /* Roxo suave para destaque */
            margin-bottom: 20px;
        }

        /* Campo de Pesquisa */
        .search-box {
            margin-bottom: 15px;
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background-color: #1e1e1e;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        .search-box:focus {
            border-color: #bb86fc;
            box-shadow: 0 0 5px rgba(187, 134, 252, 0.5);
        }

        /* Container da Tabela com Scroll */
        .table-container {
            max-height: 70vh;
            overflow-y: auto;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #1e1e1e;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        /* Cabeçalho Fixo */
        thead th {
            position: sticky;
            top: 0;
            background-color: #2c2c2c;
            color: #bb86fc;
            z-index: 10;
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid #333;
            font-weight: 600;
        }

        /* Células da Tabela */
        td {
            padding: 12px;
            border-bottom: 1px solid #2c2c2c;
            font-size: 14px;
            color: #b0b0b0;
        }

        /* Efeito de Hover nas linhas */
        tr:hover {
            background-color: #252525;
        }

        /* Estilização da Barra de Scroll */
        .table-container::-webkit-scrollbar {
            width: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #121212;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    </style>

            data.forEach(item => {
                const row = `<tr>
                    <td style="color: #fff; font-weight: bold;">${item.Nome}</td>
                    <td>${item.IP}</td>
                    <td>${item.Local}</td>
                    <td>${item.Driver}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filteredData = printerData.filter(item => 
                item.Nome.toLowerCase().includes(query) || 
                item.IP.toLowerCase().includes(query) ||

            );
