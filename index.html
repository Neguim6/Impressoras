<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressoras HGP</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050b18;
            --surface: #0a1628;
            --surface2: #0f1f3d;
            --border: rgba(56, 139, 253, 0.12);
            --border-bright: rgba(56, 139, 253, 0.3);
            --accent: #38bdf8;
            --accent2: #818cf8;
            --accent3: #34d399;
            --text: #e2e8f0;
            --muted: #64748b;
            --dim: #1e3a5f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(ellipse, rgba(56,189,248,0.05) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
            animation: driftGlow 12s ease-in-out infinite alternate;
        }

        @keyframes driftGlow {
            from { transform: translate(0, 0); }
            to { transform: translate(10%, 15%); }
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            animation: fadeDown 0.6s ease both;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: 1px solid var(--border-bright);
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(56,189,248,0.15);
        }
        .logo img { width: 100%; height: 100%; object-fit: cover; }

        .header-text h1 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            line-height: 1;
        }

        .header-text p {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.08em;
            margin-top: 4px;
        }

        /* ── STATS BAR ── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeDown 0.6s 0.1s ease both;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px 18px 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, transform 0.2s;
        }

        .stat-card:hover {
            border-color: var(--border-bright);
            transform: translateY(-3px);
        }

        .stat-card.card-blue  { border-top: 2px solid var(--accent); }
        .stat-card.card-purple{ border-top: 2px solid var(--accent2); }
        .stat-card.card-green { border-top: 2px solid var(--accent3); }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            opacity: 0.06;
        }
        .card-blue::after  { background: var(--accent); }
        .card-purple::after{ background: var(--accent2); }
        .card-green::after { background: var(--accent3); }

        .stat-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-label {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .card-blue  .stat-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .card-purple .stat-dot{ background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
        .card-green .stat-dot { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 44px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
        }
        .card-blue  .stat-value { color: var(--accent); }
        .card-purple .stat-value{ color: var(--accent2); }
        .card-green .stat-value { color: var(--accent3); }

        .stat-desc {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        .stat-bar-track {
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 2px;
        }

        .stat-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.8s cubic-bezier(0.22,1,0.36,1);
        }
        .card-blue  .stat-bar-fill { background: var(--accent); }
        .card-purple .stat-bar-fill{ background: var(--accent2); }
        .card-green .stat-bar-fill { background: var(--accent3); }

        /* ── SEARCH ── */
        .search-wrap {
            position: relative;
            margin-bottom: 20px;
            animation: fadeDown 0.6s 0.2s ease both;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 16px;
            pointer-events: none;
        }

        .search-box {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-box::placeholder { color: var(--muted); }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
        }

        .result-count {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: var(--muted);
            background: var(--surface2);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* ── TABLE ── */
        .table-wrap {
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            background: var(--surface);
            animation: fadeDown 0.6s 0.3s ease both;
        }

        .table-scroll {
            max-height: 60vh;
            overflow-y: auto;
        }

        .table-scroll::-webkit-scrollbar { width: 6px; }
        .table-scroll::-webkit-scrollbar-track { background: transparent; }
        .table-scroll::-webkit-scrollbar-thumb {
            background: var(--dim);
            border-radius: 3px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            position: sticky;
            top: 0;
            background: var(--surface2);
            padding: 13px 16px;
            text-align: left;
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        thead th:first-child { color: var(--accent); }

        tbody tr {
            border-bottom: 1px solid rgba(56,139,253,0.06);
            transition: background 0.15s;
        }

        tbody tr:last-child { border-bottom: none; }

        tbody tr:hover { background: rgba(56,189,248,0.04); }

        td {
            padding: 13px 16px;
            font-size: 12px;
            vertical-align: middle;
        }

        .td-name {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
        }

        .td-ip {
            font-size: 12px;
            color: var(--accent3);
            letter-spacing: 0.04em;
        }

        .td-local {
            color: #94a3b8;
            font-size: 12px;
        }

        .td-driver {
            color: var(--muted);
            font-size: 11px;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.02em;
            border: 1px solid;
            white-space: nowrap;
        }

        .badge-brother {
            background: rgba(129,140,248,0.08);
            border-color: rgba(129,140,248,0.2);
            color: var(--accent2);
        }

        .badge-ricoh {
            background: rgba(251,146,60,0.08);
            border-color: rgba(251,146,60,0.2);
            color: #fb923c;
        }

        /* empty state */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty svg { margin-bottom: 12px; opacity: 0.3; }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            margin-top: 28px;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.1em;
            opacity: 0.6;
        }

        /* Pulse dot */
        .pulse-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent3);
            margin-right: 6px;
            position: relative;
            vertical-align: middle;
        }
        .pulse-dot::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: var(--accent3);
            opacity: 0.3;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.8); opacity: 0; }
        }

        @media (max-width: 640px) {
            .stats-bar { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .stat-card { padding: 12px; gap: 10px; }
            .stat-value { font-size: 20px; }
            .stat-icon { width: 34px; height: 34px; font-size: 15px; border-radius: 10px; }
            thead th:nth-child(4),
            td:nth-child(4) { display: none; }
        }
    </style>
</head>

</div>

const totalLocais = new Set(printerData.map(p => p.Local)).size;
const TOTAL = printerData.length;

function animateCount(el, target, duration = 800) {
    const start = parseInt(el.textContent) || 0;
    const startTime = performance.now();
    function step(now) {
        const p = Math.min((now - startTime) / duration, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(start + (target - start) * ease);
        if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}

animateCount(document.getElementById('statTotal'), TOTAL);
animateCount(document.getElementById('statFiltered'), TOTAL);
animateCount(document.getElementById('statLocais'), totalLocais);
document.getElementById('barLocais').style.width = (totalLocais / TOTAL * 100) + '%';

function getBadge(driver) {
    if (driver.toUpperCase().includes('RICOH')) {
        return `<span class="badge badge-ricoh">${driver}</span>`;
    }
    return `<span class="badge badge-brother">${driver}</span>`;
}

function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4"><div class="empty">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <div>Nenhuma impressora encontrada</div>
        </div></td></tr>`;
        return;
    }
    tbody.innerHTML = data.map(item => `
        <tr>
            <td class="td-name">${item.Nome}</td>
            <td class="td-ip">${item.IP}</td>
            <td class="td-local">${item.Local.replace('SES - HGP - ', '')}</td>
            <td class="td-driver">${getBadge(item.Driver)}</td>
        </tr>
    `).join('');
}

function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    const filtered = q
        ? printerData.filter(p =>
            p.Nome.toLowerCase().includes(q) ||
            p.IP.includes(q) ||
            p.Local.toLowerCase().includes(q) ||
            p.Driver.toLowerCase().includes(q))
        : printerData;

    renderTable(filtered);
    animateCount(document.getElementById('statFiltered'), filtered.length);
    document.getElementById('barFiltered').style.width = (filtered.length / TOTAL * 100) + '%';
    document.getElementById('resultCount').textContent = q
        ? `${filtered.length} resultado${filtered.length !== 1 ? 's' : ''}`
        : `${TOTAL} total`;
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(r => console.log('SW ok', r))
            .catch(e => console.log('SW erro', e));
    });
}

renderTable(printerData);
document.getElementById('resultCount').textContent = `${TOTAL} total`;
